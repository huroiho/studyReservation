<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예약 상세 내역</title>
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/mypage-reservation.css}">
    <style>
        /* 모달 스타일 (mypage-reservation.css에 이미 있다면 중복될 수 있으나 안전하게 추가하거나 css 파일 확인 필요) */
        /* mypage-reservation.css에 이미 추가되었으므로 여기서는 생략 가능하지만,
           혹시 css 파일이 캐시되어 안 보일 수 있으니 css 파일 import만 잘 하면 됨 */
    </style>
</head>
<body>
<Header th:insert="~{fragment/header :: siteHeader(activeLink='')}"></Header>
<nav th:insert="~{fragment/admin-nav :: siteNav('reservations')}"></nav>

<div class="container">
    <div class="page_title">
        <h2>예약 상세 내역</h2>
        <span class="badge rounded-pill status-badge"
              th:classappend="${reservationDetail.reservationInfo.status == 'CONFIRMED' ? 'text-bg-success' :
                                      (reservationDetail.reservationInfo.status == 'CANCELED' ? 'text-bg-secondary' : 'text-bg-warning')}"
              th:text="${reservationDetail.reservationInfo.status}">
              STATUS
        </span>
    </div>
    <div class="container_box">
        <div class="card">
            <div class="card-header">
                <h4>🏠 스터디룸 정보</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <!-- 썸네일 이미지 수정 -->
                        <img th:src="${reservationDetail.roomInfo.thumbnailUrl != null ? reservationDetail.roomInfo.thumbnailUrl : '/api/placeholder/300/200'}"
                             class="img-fluid rounded" alt="Room Image"
                             onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    </div>
                    <div class="col-md-8">
                        <h4 class="card-title fw-bold mb-3" th:text="${reservationDetail.roomInfo.name}">룸 이름</h4>

                        <div class="mb-2">
                            <span class="info-label">이용 시작:</span>
                            <span class="info-value"
                                  th:text="${#temporals.format(reservationDetail.reservationInfo.startTime, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                        <div class="mb-2">
                            <span class="info-label">이용 종료:</span>
                            <span class="info-value"
                                  th:text="${#temporals.format(reservationDetail.reservationInfo.endTime, 'yyyy-MM-dd HH:mm')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h4>예약자 정보</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <span class="info-label">이름:</span>
                        <span th:text="${reservationDetail.memberInfo.name}">홍길동</span>
                    </div>
                    <div class="col-md-6">
                        <span class="info-label">이메일:</span>
                        <span th:text="${reservationDetail.memberInfo.email}">test@email.com</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" th:if="${reservationDetail.paymentInfo != null}">
            <div class="card-header">
                <h4>💳 결제 정보</h4>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6 mb-2">
                        <div class="info-label">결제 금액</div>
                        <div class="info-value fw-bold fs-5">
                            <span th:text="${#numbers.formatInteger(reservationDetail.paymentInfo.amount, 0, 'COMMA')}"></span>원
                        </div>
                    </div>
                    <div class="col-6 mb-2">
                        <div class="info-label">승인 일시</div>
                        <div class="info-value"
                             th:text="${#temporals.format(reservationDetail.paymentInfo.approvedAt, 'yyyy-MM-dd HH:mm:ss')}"></div>
                    </div>
                    <div class="col-12 mt-2">
                        <div class="info-label">주문 번호</div>
                        <div class="info-value text-muted small" th:text="${reservationDetail.paymentInfo.successOrderId}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-2 mt-5">
            <a href="/members/mypage/reservations" class="btn btn-outline-secondary px-4">목록으로</a>

            <!-- 취소 버튼 수정: 모달 호출 -->
            <form th:if="${reservationDetail.isReservationCancellable}"
                  th:id="'cancelForm-' + ${reservationDetail.reservationInfo.id}"
                  th:action="@{/reservations/{id}/cancel(id=${reservationDetail.reservationInfo.id})}"
                  method="post">

                <!-- CONFIRMED 상태일 때: 환불 모달 띄우기 -->
                <button th:if="${reservationDetail.reservationInfo.status == 'CONFIRMED'}"
                        type="button" class="btn btn-danger px-4"
                        th:onclick="'openRefundModal(' + ${reservationDetail.reservationInfo.id} + ')'">
                    예약 취소
                </button>

                <!-- TEMP 상태일 때: 바로 취소 (단순 확인) -->
                <button th:if="${reservationDetail.reservationInfo.status == 'TEMP'}"
                        type="submit" class="btn btn-danger px-4"
                        onclick="return confirm('결제 대기 중인 예약을 취소하시겠습니까?');">
                    예약 취소
                </button>
            </form>

            <button th:unless="${reservationDetail.isReservationCancellable}"
                    class="btn btn-secondary px-4" disabled>
                취소 불가
            </button>
        </div>

    </div>
</div>

<!-- 환불 안내 모달 (목록 페이지와 동일) -->
<div id="refundModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>예약 취소 및 환불 안내</h3>
        </div>
        <div class="refund-info">
            <div class="info-row">
                <span>적용 정책</span>
                <span id="policyName">-</span>
            </div>
            <div class="info-row">
                <span>총 결제 금액</span>
                <span id="totalAmount">0원</span>
            </div>
            <div class="info-row highlight">
                <span>환불율</span>
                <span id="refundRate">0%</span>
            </div>
            <div class="info-row">
                <span>환불 예정 금액</span>
                <span id="refundAmount">0원</span>
            </div>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn-modal btn-close" onclick="closeRefundModal()">닫기</button>
            <button type="button" class="btn-modal btn-confirm" onclick="confirmCancel()">취소 확정</button>
        </div>
    </div>
</div>

<Footer th:insert="~{fragment/footer :: siteFooter}"></Footer>

<!-- JS 추가 -->
<script th:src="@{/js/mypage-reservation.js}"></script>

</body>
</html>
