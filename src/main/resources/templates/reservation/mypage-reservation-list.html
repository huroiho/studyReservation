<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예약 관리</title>
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/mypage-reservation.css}">
</head>
<body>

<Header th:insert="~{fragment/header :: siteHeader}"></Header>

<div class="container">
    <div class="tabs">
        <a href="#" class="active">예약 관리</a>
        <a href="#">내 정보</a>
        <a href="#">예약 히스토리</a>
    </div>

    <section class="content">
        <div class="section-header">
            <h2>현재 예약 <span class="count-badge" th:text="${reservations.size()}">0</span></h2>
        </div>

        <div th:if="${#lists.isEmpty(reservations)}" class="empty-state">
            <p>현재 예약된 내역이 없습니다.</p>
        </div>

        <div th:each="res : ${reservations}" class="reservation-card">
            <div class="card-left">
                <img th:src="${res.roomImageUrl != null ? res.roomImageUrl : '/api/placeholder/120/80'}"
                     alt="room image" class="room-img">

                <div class="info-group">
                    <h3 class="room-name" th:text="${res.roomName}">스터디룸 A</h3>
                    <p class="datetime">
                        <i class="icon-calendar"></i>
                        <span th:text="${#temporals.format(res.startTime, 'yyyy년 M월 d일')}">2026년 2월 2일</span>
                        <span th:text="${#temporals.format(res.startTime, 'HH:mm')}">14:00</span> -
                        <span th:text="${#temporals.format(res.endTime, 'HH:mm')}">17:00</span>
                    </p>
                    <p class="price-info">
                        <span th:text="${res.durationText}">3시간</span> |
                        <span class="amount" th:text="'₩' + ${#numbers.formatInteger(res.totalAmount, 0, 'COMMA')}">₩30,000</span>
                    </p>
                </div>
            </div>

            <div class="card-right">
                <span th:if="${res.status == 'CONFIRMED'}" class="status-badge badge-green">승인 완료</span>
                <span th:if="${res.status == 'TEMP'}" class="status-badge badge-yellow">결제 대기</span>
<!--                <span th:if="${res.status == 'EXPIRED'}" class="status-badge badge-red">만료됨</span>-->

                <button th:if="${(res.status == 'CONFIRMED' || res.status == 'TEMP')
                    and res.startTime.isAfter(#temporals.createNow())}"
                        class="btn-cancel"
                        th:onclick="'cancelReservation(' + ${res.reservationId} + ')'">
                    예약 취소
                </button>
            </div>
        </div>
    </section>
</div>
<Footer th:insert="~{fragment/footer :: siteFooter}"></Footer>
</body>
</html>
