<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디룸 목록</title>
    <link rel="stylesheet" th:href="@{/css/room-user-list.css}">
</head>
<body>
<div class="page-container">
    <div class="content-wrapper">

        <!-- Header -->
        <div class="page-header">
            <h1 class="page-title">스터디룸 예약</h1>
            <p class="page-description">원하는 스터디룸을 선택하고 예약하세요.</p>
        </div>

        <!-- Filter Form -->
        <form method="get" th:action="@{/rooms}" class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="minCapacity">최소 인원</label>
                    <select id="minCapacity" name="minCapacity" class="filter-select">
                        <option value="">전체</option>
                        <option value="2" th:selected="${minCapacity == 2}">2명 이상</option>
                        <option value="4" th:selected="${minCapacity == 4}">4명 이상</option>
                        <option value="6" th:selected="${minCapacity == 6}">6명 이상</option>
                        <option value="8" th:selected="${minCapacity == 8}">8명 이상</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort">정렬</label>
                    <select id="sort" name="sort" class="filter-select">
                        <option value="name" th:selected="${sort == 'name'}">이름순</option>
                        <option value="price" th:selected="${sort == 'price'}">가격순</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-filter">검색</button>
            </div>
        </form>

        <!-- Empty State -->
        <div th:if="${page.isEmpty()}" class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <p class="empty-text">조건에 맞는 스터디룸이 없습니다.</p>
        </div>

        <!-- Room Grid -->
        <div th:if="${!page.isEmpty()}" class="room-grid">
            <article th:each="room : ${page.content}" class="room-card">
                <a th:href="@{/rooms/{id}(id=${room.id})}" class="room-link">
                    <div class="room-image-wrapper">
                        <img th:if="${room.mainImageUrl != null}"
                             th:src="${room.mainImageUrl}"
                             th:alt="${room.name}"
                             class="room-image">
                        <div th:if="${room.mainImageUrl == null}" class="room-image-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <path d="M21 15l-5-5L5 21"/>
                            </svg>
                        </div>
                    </div>
                    <div class="room-info">
                        <h3 class="room-name" th:text="${room.name}">스터디룸 A</h3>
                        <p class="room-capacity">
                            <span class="capacity-icon">👥</span>
                            최대 <span th:text="${room.maxCapacity}">4</span>명
                        </p>
                        <p class="room-price">
                            <span class="price-value" th:text="${#numbers.formatInteger(room.price, 0, 'COMMA')}">10,000</span>
                            <span class="price-unit">원/시간</span>
                        </p>
                    </div>
                </a>
            </article>
        </div>

        <!-- Pagination -->
        <nav th:if="${page.totalPages > 1}" class="pagination">
            <a th:href="@{/rooms(page=${page.number - 1}, size=${page.size}, minCapacity=${minCapacity}, sort=${sort})}"
               th:classappend="${page.first} ? 'disabled'"
               class="pagination-btn">이전</a>

            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:href="@{/rooms(page=${i}, size=${page.size}, minCapacity=${minCapacity}, sort=${sort})}"
                   th:classappend="${page.number == i} ? 'active'"
                   th:text="${i + 1}"
                   class="pagination-btn">1</a>
            </th:block>

            <a th:href="@{/rooms(page=${page.number + 1}, size=${page.size}, minCapacity=${minCapacity}, sort=${sort})}"
               th:classappend="${page.last} ? 'disabled'"
               class="pagination-btn">다음</a>
        </nav>

    </div>
</div>
</body>
</html>
