<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>예약 히스토리</title>
    <link rel="stylesheet" th:href="@{/css/mypage-reservation.css}">
</head>
<body>
<div class="container">
    <h2>마이페이지</h2>

    <nav class="tabs">
        <a th:href="@{/members/myPage/reservations}" class="tab">예약 현황</a>
        <a href="#" class="tab">내 정보</a>
        <a th:href="@{/members/myPage/history}" class="tab active">예약 히스토리</a>
    </nav>

    <section class="content">
        <div class="section-header">
            <h2>예약 히스토리</h2>
        </div>

        <div class="history-section">
            <table class="history-table">
                <thead>
                <tr>
                    <th>날짜</th>
                    <th>룸 이름</th>
                    <th>이용 시간</th>
                    <th>결제 금액</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="res : ${reservations}">
                    <td th:text="${#temporals.format(res.startTime, 'yyyy-MM-dd')}">2026-02-02</td>
                    <td class="room-name" th:text="${res.roomName}">미팅룸 A</td>
                    <td>
                        <span th:text="${#temporals.format(res.startTime, 'HH:mm')}">14:00</span> ~
                        <span th:text="${#temporals.format(res.endTime, 'HH:mm')}">16:00</span>
                    </td>
                    <td th:text="${#numbers.formatInteger(res.totalAmount, 3, 'COMMA') + '원'}">10,000원</td>
                    <td>
                            <span class="status-badge"
                                  th:classappend="${res.status.toString() == 'CANCELED' ? 'cancel' : 'used'}"
                                  th:text="${res.status}">USED</span>
                    </td>
                </tr>
                <tr th:if="${reservations.isEmpty()}">
                    <td colspan="5" class="no-data">과거 예약 내역이 없습니다.</td>
                </tr>
                </tbody>
            </table>

            <div class="pagination" th:if="${historyPage != null and historyPage.totalElements > 0}">

                <a th:href="@{/members/myPage/history(page=${historyPage.number - 1})}"
                   th:classappend="${historyPage.first} ? 'disabled'">&laquo; 이전</a>

                <span th:each="i : ${#numbers.sequence(0, historyPage.totalPages - 1)}">
                    <a th:href="@{/members/myPage/history(page=${i})}"
                       th:text="${i + 1}"
                       th:classappend="${i == historyPage.number} ? 'active'">1</a>
                </span>

                <a th:href="@{/members/myPage/history(page=${historyPage.number + 1})}"
                   th:classappend="${historyPage.last} ? 'disabled'">다음 &raquo;</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
