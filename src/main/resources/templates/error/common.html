<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${statusCode} + ' - 오류 발생'">오류 발생</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 48px 40px;
            text-align: center;
        }

        .error-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .error-icon svg {
            width: 60px;
            height: 60px;
            stroke: white;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .status-code {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .error-details {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 32px;
            text-align: left;
        }

        .error-details-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .error-details-row:last-child {
            border-bottom: none;
        }

        .error-details-label {
            font-size: 13px;
            font-weight: 600;
            color: #718096;
            min-width: 100px;
            flex-shrink: 0;
        }

        .error-details-value {
            font-size: 13px;
            color: #2d3748;
            word-break: break-all;
        }

        .error-code-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        @media (max-width: 640px) {
            .error-container {
                padding: 32px 24px;
            }

            .status-code {
                font-size: 56px;
            }

            .error-title {
                font-size: 20px;
            }

            .error-icon {
                width: 100px;
                height: 100px;
            }

            .error-icon svg {
                width: 50px;
                height: 50px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="error-container">
    <!-- Error Icon -->
    <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
    </div>

    <!-- Status Code -->
    <div class="status-code" th:text="${statusCode}">500</div>

    <!-- Error Title -->
    <h1 class="error-title">오류가 발생했습니다</h1>

    <!-- Error Message -->
    <p class="error-message" th:text="${errorMessage}">
        요청을 처리하는 중 문제가 발생했습니다.
    </p>

    <!-- Error Details -->
    <div class="error-details">
        <div class="error-details-row">
            <span class="error-details-label">에러 코드</span>
            <span class="error-details-value">
                <span class="error-code-badge" th:text="${errorCode}">C001</span>
            </span>
        </div>
        <div class="error-details-row" th:if="${path}">
            <span class="error-details-label">요청 경로</span>
            <span class="error-details-value" th:text="${path}">/api/example</span>
        </div>
        <div class="error-details-row">
            <span class="error-details-label">시간</span>
            <span class="error-details-value" th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">
                2024-01-27 10:30:45
            </span>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button class="btn btn-secondary" onclick="window.history.back();">
            이전 페이지
        </button>
        <a href="/" class="btn btn-primary">
            홈으로 가기
        </a>
    </div>
</div>
</body>
</html>
