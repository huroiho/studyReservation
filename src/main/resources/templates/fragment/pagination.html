<div th:fragment="sitePagination(paging, targetUrl)"
     th:if="${paging != null and paging.totalPages >= 1}"
     class="pagination-wrap">

    <ul class="pagination">
        <li class="page-item" th:classappend="${paging.first} ? 'disabled'">
            <a class="page-link" th:href="@{${targetUrl}(page=0, minCapacity=${minCapacity ?: null}, sort=${sort ?: null})}">
                <span class="material-icons" style="font-size: 14px;">first_page</span>
            </a>
        </li>

        <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
            <a class="page-link" th:href="@{${targetUrl}(page=${paging.number - 1}, minCapacity=${minCapacity ?: null}, sort=${sort ?: null})}">이전</a>
        </li>

        <li th:each="pageIdx : ${#numbers.sequence(0, paging.totalPages - 1)}"
            th:if="${pageIdx >= paging.number - 2 and pageIdx <= paging.number + 2}"
            th:classappend="${pageIdx == paging.number} ? 'active'" class="page-item">
            <a th:text="${pageIdx + 1}" class="page-link"
               th:href="@{${targetUrl}(page=${pageIdx}, minCapacity=${minCapacity ?: null}, sort=${sort ?: null})}"></a>
        </li>

        <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
            <a class="page-link" th:href="@{${targetUrl}(page=${paging.number + 1}, minCapacity=${minCapacity ?: null}, sort=${sort ?: null})}">다음</a>
        </li>

        <li class="page-item" th:classappend="${paging.last} ? 'disabled'">
            <a class="page-link" th:href="@{${targetUrl}(page=${paging.totalPages - 1}, minCapacity=${minCapacity ?: null}, sort=${sort ?: null})}">
                <span class="material-icons" style="font-size: 14px;">last_page</span>
            </a>
        </li>
    </ul>
</div>
