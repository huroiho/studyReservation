<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>환불 정책 등록</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/refund-admin-detail.css}" />
</head>
<body>
<header th:insert="~{fragment/header :: siteHeader(activeLink='')}"></header>
<nav th:insert="~{fragment/admin-nav :: siteNav(activeLink='refund/policy')}"></nav>

<div class="container">
    <a th:href="@{list}" class="back-link">
        <span class="material-icons" style="font-size: 18px;">arrow_back</span> 목록으로
    </a>
    <h2>환불 정책 등록</h2>
    <div class="info-box">
        <span class="material-icons icon">error_outline</span>
        <div>
            <div class="warning-text">환불 정책은 생성 후 내용 수정이 불가능합니다.</div>
            <div class="sub-text">필요 시 새로운 정책을 등록하거나 상태를 변경하세요.</div>
        </div>
    </div>
    <form th:action="@{/admin/refund/policy/new}" th:object="${policyForm}" method="post" id="policyForm">

        <div class="form-group">
            <label for="policyName">정책 이름</label>
            <input type="text" id="policyName" th:field="*{name}" placeholder="예: 기본 환불 정책" required>
            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <label style="margin-top: 30px; display: block;">환불 규칙 목록</label>
        <div id="rule-list">
            <div class="rule-item" th:each="rule, stat : *{rules}">
                <div>
                    <label th:for="${'ruleName-' + stat.index}">규칙명</label>
                    <input type="text" th:id="${'ruleName-' + stat.index}" th:field="*{rules[__${stat.index}__].name}" placeholder="예: 7일전" required>
                    <span class="error" th:if="${#fields.hasErrors('rules[__${stat.index}__].name')}" th:errors="*{rules[__${stat.index}__].name}"></span>
                </div>
                <div>
                    <label th:for="${'ruleTime-' + stat.index}">기준 시간(분)</label>
                    <input type="number" th:id="${'ruleTime-' + stat.index}" th:field="*{rules[__${stat.index}__].refundBaseMinutes}" placeholder="10080" required>
                    <div class="help-text">예: 60 (1시간 전)</div>
                    <span class="error" th:if="${#fields.hasErrors('rules[__${stat.index}__].refundBaseMinutes')}" th:errors="*{rules[__${stat.index}__].refundBaseMinutes}"></span>
                </div>
                <div>
                    <label th:for="${'ruleRate-' + stat.index}">환불율(%)</label>
                    <input type="number" th:id="${'ruleRate-' + stat.index}" th:field="*{rules[__${stat.index}__].refundRate}" placeholder="100" min="0" max="100" required>
                    <span class="error" th:if="${#fields.hasErrors('rules[__${stat.index}__].refundRate')}" th:errors="*{rules[__${stat.index}__].refundRate}"></span>
                </div>
                <button type="button" class="btn btn-del" onclick="removeRule(this)">삭제</button>
            </div>
        </div>

        <button type="button" class="btn btn-add" onclick="addRule()">+ 규칙 추가하기</button>
        <button type="submit" class="btn btn-submit">저장하기</button>
    </form>

    <template id="ruleTemplate">
    <div class="rule-item">
        <div>
            <label>규칙명</label>
            <input type="text" class="input-name" placeholder="예: 7일전" required>
        </div>
        <div>
            <label>시간(분)</label>
            <input type="number" class="input-time" placeholder="10080" required>
            <div class="help-text">예: 60 (1시간 전)</div>
        </div>
        <div>
            <label>비율(%)</label>
            <input type="number" class="input-rate" placeholder="100" min="0" max="100" required>
        </div>
        <button type="button" class="btn btn-del" onclick="removeRule(this)">삭제</button>
    </div>
</template>
</div>
<Footer th:insert="~{fragment/footer :: siteFooter}"></Footer>
<script>
    // 페이지 로드 시 규칙이 하나도 없으면 기본 추가
    document.addEventListener("DOMContentLoaded", function() {
        const list = document.getElementById('rule-list');
        if (list.children.length === 0) {
            addRule();
        }
    });

    function addRule() {
        const container = document.getElementById('rule-list');
        const template = document.getElementById('ruleTemplate');

        // 템플릿 내용을 복사 (Clone)
        const clone = document.importNode(template.content, true);

        // DOM에 먼저 추가
        container.appendChild(clone);

        // 인덱스 재정렬 (name 속성 부여)
        reindexRules();
    }

    function removeRule(btn) {
        const item = btn.closest('.rule-item');
        const container = document.getElementById('rule-list');
        if (container.children.length <= 1) return alert("최소 1개의 규칙이 필요합니다.");

        item.remove();
        reindexRules();
    }

    function reindexRules() {
        const items = document.querySelectorAll('.rule-item');
        items.forEach((item, index) => {
            // 각 인풋 필드 찾아서 name 속성 업데이트

            const nameInput = item.querySelector('.input-name') || item.querySelector('[name*="name"]');
            if(nameInput) nameInput.name = `rules[${index}].name`;

            const timeInput = item.querySelector('.input-time') || item.querySelector('[name*="refundBaseMinutes"]');
            if(timeInput) timeInput.name = `rules[${index}].refundBaseMinutes`;

            const rateInput = item.querySelector('.input-rate') || item.querySelector('[name*="refundRate"]');
            if(rateInput) rateInput.name = `rules[${index}].refundRate`;
        });
    }
</script>

</body>
</html>
