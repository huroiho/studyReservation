<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>예약 통합 관리</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/admin-reservation-list.css}">
</head>
<body>

<header th:insert="~{fragment/header :: siteHeader(activeLink='')}"></header>
<nav th:insert="~{fragment/admin-nav :: siteNav(activeLink='reservations')}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>예약 통합 관리</h2>
        <span class="text-muted">전체 예약 내역을 관리합니다.</span>
    </div>

    <div class="table-container">
        <table class="room-table">
            <thead>
                <tr>
                    <th style="width: 5%; text-align: center;">ID</th>
                    <th style="width: 18%;">예약자 정보</th>
                    <th style="width: 17%;">스터디룸</th>
                    <th style="width: 12%;">이용 시간</th>
                    <th style="width: 12%; text-align: right;">결제 금액</th>
                    <th style="width: 10%; text-align: center;">상태</th>
                    <th style="width: 16%; text-align: center;">예약일</th>
                    <th style="width: 10%; text-align: center;">관리</th>
                </tr>
            </thead>
            <tbody>
            <tr th:each="res : ${reservations}">
                <td style="text-align: center;">
                    <span class="td-bold" th:text="'#' + ${res.id}">#1</span>
                </td>

                <td>
                        <span class="td-bold text-ellipsis"
                              th:text="${res.memberEmail}"
                              th:title="${res.memberEmail}">user@example.com</span>
                </td>

                <td>
                        <span class="td-bold text-ellipsis"
                              th:text="${res.roomName}"
                              th:title="${res.roomName}">A룸</span>
                </td>

                <td>
                    <div class="d-flex flex-column">
                        <span class="td-bold" th:text="${#temporals.format(res.startTime, 'yyyy-MM-dd')}">2024-02-01</span>
                        <span class="td-sub">
                                <span th:text="${#temporals.format(res.startTime, 'HH:mm')}">10:00</span> ~
                                <span th:text="${#temporals.format(res.endTime, 'HH:mm')}">12:00</span>
                            </span>
                    </div>
                </td>

                <td style="text-align: right;">
                    <span class="price-text" th:text="${#numbers.formatInteger(res.totalAmount, 0, 'COMMA') + '원'}">10,000원</span>
                </td>

                <td style="text-align: center;">
                        <span class="status-badge"
                              th:classappend="${res.status.name() == 'CONFIRMED' ? 'status-confirmed' :
                                              (res.status.name() == 'CANCELED' ? 'status-canceled' :
                                              (res.status.name() == 'TEMP' ? 'status-temp' :
                                              (res.status.name() == 'EXPIRED' ? 'status-expired' :
                                              (res.status.name() == 'USED' ? 'status-used' : ''))))}"
                              th:text="${res.status}">CONFIRMED</span>
                </td>

                <td style="text-align: center; color: #64748b;">
                    <span th:text="${#temporals.format(res.createdAt, 'yyyy-MM-dd')}">2024-02-01</span>
                </td>

                <td style="text-align: center;">
                    <a th:href="@{/admin/reservations/{id}(id=${res.id})}" class="btn-action">상세</a>
                </td>
            </tr>

            <tr th:if="${reservations.isEmpty()}">
                <td colspan="8" class="text-center py-5">
                    <span style="color: #94a3b8;">예약 내역이 존재하지 않습니다.</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:replace="~{fragment/pagination :: sitePagination(${reservations}, '/admin/reservations')}"></div>
</div>

<Footer th:insert="~{fragment/footer :: siteFooter}"></Footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
