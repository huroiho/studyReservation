variables:
  DEPLOY_BRANCH: "develop"

stages:
  - build
  - test
  - deploy

# 1) 모든 브랜치 push에서 build 실행 (develop 포함)
build_job:
  stage: build
  tags: [studyroom-deploy]
  script:
    - echo "빌드 작업을 시작합니다..."
    - chmod +x ./gradlew
    - ./gradlew clean build -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# 2) 모든 브랜치 push에서 test 실행 (develop 포함)
test_job:
  stage: test
  tags: [studyroom-deploy]
  script:
    - echo "코드 테스트를 수행합니다..."
    - chmod +x ./gradlew
    - ./gradlew test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# 3) develop 브랜치에 push될 때만 deploy 실행
#    (즉, MR이 merge되어 develop에 반영될 때 deploy 됨)
deploy_job:
  stage: deploy
  tags: [studyroom-deploy]
  needs: [build_job, test_job]
  script:
    - echo "배포를 시작합니다..."

    # (권장) 환경변수 빈 값 방어
    - test -n "$DB_URL" && echo "DB_URL OK" || (echo "DB_URL EMPTY" && exit 1)
    - test -n "$DB_USERNAME" && echo "DB_USERNAME OK" || (echo "DB_USERNAME EMPTY" && exit 1)
    - test -n "$DB_PASSWORD" && echo "DB_PASSWORD OK" || (echo "DB_PASSWORD EMPTY" && exit 1)

    # (권장) 8080 포트 점유 프로세스만 종료
    - sudo fuser -k 8080/tcp || true
    - sleep 2

    # (권장) jar 1개 확정
    - JAR=$(ls -1t build/libs/*SNAPSHOT.jar | head -n 1)
    - echo "Using JAR: $JAR"

    - nohup java -Dspring.profiles.active=dev -jar "$JAR" > app.log 2>&1 &
    - sleep 2
    - ss -ltnp | grep 8080
    - tail -n 50 app.log || true

    - echo "배포 완료"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $DEPLOY_BRANCH'
