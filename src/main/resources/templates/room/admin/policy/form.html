<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>운영 정책 생성</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/operation-policy.css}" />
</head>

<body class="operation-policy-create">
<header th:insert="~{fragment/header :: siteHeader(activeLink='')}"></header>
<nav th:insert="~{fragment/admin-nav :: siteNav(activeLink='operation-policies')}"></nav>
<div class="container">
    <a th:href="@{/admin/operation-policies}" class="back-link">
        <span class="material-icons" style="font-size: 18px;">arrow_back</span> 목록으로
    </a>

    <h2>운영 정책 생성</h2>

    <div class="info-box">
        <span class="material-icons icon">error_outline</span>
        <div>
            <div class="warning-text">방 예약 규칙은 생성 후 수정할 수 없습니다.</div>
            <div style="color: #856404; font-size: 0.85rem;">입력 내용을 신중히 확인한 후 등록하세요.</div>
        </div>
    </div>

    <section class="card">
        <form id="policyCreateForm"
              th:action="@{/admin/operation-policies}"
              th:object="${form}"
              method="post">

            <!-- 글로벌 에러(비즈니스 에러 reject("business", ...) 등) -->
            <div class="global-error" th:if="${#fields.hasGlobalErrors()}">
                <ul class="global-error-list">
                    <li th:each="e : ${#fields.globalErrors()}" th:text="${e}"></li>
                </ul>
            </div>

            <!-- 정책명 -->
            <div class="form-group">
                <label for="name">정책명 <span class="required">*</span></label>
                <input id="name" type="text" th:field="*{name}" placeholder="예: 표준 30분 정책" />
                <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <!-- 슬롯 단위(버튼형) -->
            <div class="form-group">
                <label>슬롯 단위 <span class="required">*</span></label>

                <div class="segmented">
                    <div th:each="u : ${slotUnits}">
                        <input class="segmented-input"
                               type="radio"
                               th:field="*{slotUnit}"
                               th:value="${u}"
                               th:id="${'slot_' + u.name()}" />
                        <label class="segmented-btn"
                               th:for="${'slot_' + u.name()}"
                               th:text="${u.label}">
                        </label>
                    </div>
                </div>

                <p class="error" th:if="${#fields.hasErrors('slotUnit')}" th:errors="*{slotUnit}"></p>
            </div>

            <hr />

            <h3>요일별 운영 시간</h3>

            <!-- schedules 리스트 자체 에러(7개 필수 등) -->
            <p class="error" th:if="${#fields.hasErrors('schedules')}" th:errors="*{schedules}"></p>

            <div class="schedule-table">
                <div class="schedule-row header">
                    <span>요일</span>
                    <span>운영</span>
                    <span>오픈</span>
                    <span>마감</span>
                </div>

                <!-- IMPORTANT: schedules는 List라서 index 기반으로 바인딩해야 함 -->
                <div th:each="day, stat : ${days}" class="schedule-row">

                    <!-- 화면 표시용 요일 -->
                    <span th:text="${day.getDisplayName(T(java.time.format.TextStyle).SHORT, T(java.util.Locale).KOREAN)}"></span>

                    <!-- 서버로 보내기 위한 dayOfWeek(숨김) -->
                    <input type="hidden" th:field="*{schedules[__${stat.index}__].dayOfWeek}" th:value="${day}" />

                    <!-- 휴무 체크박스: closed -->
                    <label class="closed-label">
                        <input type="checkbox"
                               class="closed-toggle"
                               th:field="*{schedules[__${stat.index}__].closed}" />
                        <span></span>
                    </label>

                    <!-- 오픈 시간 -->
                    <select class="time-select open-select"
                            th:field="*{schedules[__${stat.index}__].openTime}">
                        <option value="">선택</option>
                        <option th:each="t : ${hours}"
                                th:value="${t}"
                                th:text="${#temporals.format(t, 'HH:mm')}"></option>
                    </select>

                    <!-- 마감 시간 -->
                    <select class="time-select close-select"
                            th:field="*{schedules[__${stat.index}__].closeTime}">
                        <option value="">선택</option>
                        <option th:each="t : ${hours}"
                                th:value="${t}"
                                th:text="${#temporals.format(t, 'HH:mm')}"></option>
                    </select>

                    <!-- 행 단위 검증 메시지(AssertTrue 3개) -->
                    <div class="row-errors">
                        <p class="error"
                           th:if="${#fields.hasErrors('schedules[' + stat.index + '].timesPresentWhenOpen')}"
                           th:errors="*{schedules[__${stat.index}__].timesPresentWhenOpen}"></p>

                        <p class="error"
                           th:if="${#fields.hasErrors('schedules[' + stat.index + '].hourOnlyWhenOpen')}"
                           th:errors="*{schedules[__${stat.index}__].hourOnlyWhenOpen}"></p>

                        <p class="error"
                           th:if="${#fields.hasErrors('schedules[' + stat.index + '].openBeforeCloseWhenOpen')}"
                           th:errors="*{schedules[__${stat.index}__].openBeforeCloseWhenOpen}"></p>
                    </div>
                </div>
            </div>

            <div class="actions">
                <a th:href="@{/admin/operation-policies}">취소</a>
                <button type="submit">생성</button>
            </div>
        </form>
    </section>
</div>
<Footer th:insert="~{fragment/footer :: siteFooter}"></Footer>
<script th:src="@{/js/operation-policy-create.js}" defer></script>
</body>
</html>
