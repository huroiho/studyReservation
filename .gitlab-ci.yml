######################################
# 학습용으로 실제로는 다른 방식으로 할 것!
######################################
variables:
  TARGET_BRANCH: "develop"
stages:
  - build
  - test
  - deploy
build_job:
  stage: build
  tags:
    - studyroom-deploy
  script:
    - echo "빌드 작업을 시작합니다..."
    - chmod +x ./gradlew
    - ./gradlew clean build -x test
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $TARGET_BRANCH
    - if: $CI_COMMIT_BRANCH == "ci/env-test"
test_job:
  stage: test
  tags:
    - studyroom-deploy
  script:
    - echo "코드 테스트를 수행합니다..."
    - chmod +x ./gradlew
    - ./gradlew test
  artifacts:
    when: always
    paths:
      - build/reports/tests/test/
      - build/reports/problems/
      - build/test-results/test/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $TARGET_BRANCH
    - if: $CI_COMMIT_BRANCH == "ci/env-test"
deploy_job:
  stage: deploy
  needs:
    - build_job
    - test_job
  tags:
    - studyroom-deploy
  script:
    - echo "운영 서버 배포를 시작합니다..."
    - test -n "$DB_URL" && echo "DB_URL OK" || (echo "DB_URL EMPTY" && exit 1)
    - test -n "$DB_USERNAME" && echo "DB_USERNAME OK" || (echo "DB_USERNAME EMPTY" && exit 1)
    - test -n "$DB_PASSWORD" && echo "DB_PASSWORD OK" || (echo "DB_PASSWORD EMPTY" && exit 1)
    - test -n "$TOSS_CLIENT_KEY" && echo "TOSS_CLIENT_KEY OK" || (echo "TOSS_CLIENT_KEY EMPTY" && exit 1)
    - test -n "$TOSS_SECRET_KEY" && echo "TOSS_SECRET_KEY OK" || (echo "TOSS_SECRET_KEY EMPTY" && exit 1)

    - sudo pkill -f 'build/libs/.*SNAPSHOT\.jar' || true
    - sleep 5

    - nohup java -Dspring.profiles.active=dev -jar build/libs/*SNAPSHOT.jar > app.log 2>&1 &
    - echo "배포가 완료되었습니다!"
  rules:
    - if: $CI_COMMIT_BRANCH == $TARGET_BRANCH
    - if: $CI_COMMIT_BRANCH == "ci/env-test"
######################################
# 학습용으로 실제로는 다른 방식으로 할 것!
######################################
