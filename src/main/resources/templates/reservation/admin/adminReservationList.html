<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}">
<head>
    <title>예약 통합 관리</title>
</head>

<div layout:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="mt-4">예약 통합 관리</h1>


        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-table me-1"></i>
                전체 예약 목록
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover table-bordered">
                    <thead class="table-dark text-center">
                    <tr>
                        <th style="width: 5%">ID</th>
                        <th style="width: 15%">회원 이메일</th>
                        <th style="width: 15%">스터디룸</th>
                        <th style="width: 20%">이용 시간</th>
                        <th style="width: 10%">결제 금액</th>
                        <th style="width: 10%">상태</th>
                        <th style="width: 15%">예약일</th>
                        <th style="width: 10%">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="res : ${reservations}" class="align-middle">
                        <td class="text-center" th:text="${res.id}">1</td>

                        <td th:text="${res.memberEmail}">user@example.com</td>

                        <td th:text="${res.roomName}">A룸</td>
                        <td class="text-center">
                            <span th:text="${#temporals.format(res.startTime, 'yyyy-MM-dd HH:mm')}"></span> <br>
                            ~ <span th:text="${#temporals.format(res.endTime, 'HH:mm')}"></span>
                        </td>

                        <td class="text-end" th:text="${#numbers.formatInteger(res.totalAmount, 0, 'COMMA') + '원'}">10,000원</td>

                        <td class="text-center">
                                <span class="badge rounded-pill"
                                      th:classappend="${res.status.name() == 'CONFIRMED' ? 'bg-success' :
                                                      (res.status.name() == 'CANCELED' ? 'bg-danger' :
                                                      (res.status.name() == 'TEMP' ? 'bg-warning text-dark' :
                                                      (res.status.name() == 'USED' ? 'bg-secondary' : 'bg-info')))}"
                                      th:text="${res.status}">CONFIRMED</span>
                        </td>
                        <td class="text-center" th:text="${#temporals.format(res.createdAt, 'yyyy-MM-dd HH:mm')}">2024-02-01 10:00</td>
                        <td class="text-center">
                            <a th:href="@{/admin/reservations/{id}(id=${res.id})}" class="btn btn-sm btn-outline-primary">상세</a>
                        </td>
                    </tr>

                    <tr th:if="${reservations.isEmpty()}">
                        <td colspan="8" class="text-center py-4">예약 내역이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>

                <nav th:if="${!reservations.isEmpty()}" aria-label="Page navigation">
                    <ul class="pagination justify-content-center"
                        th:with="start=${(reservations.number/maxPage)*maxPage + 1},
                                 end=(${reservations.totalPages == 0 ? 1 :
                                      (start + (maxPage - 1) < reservations.totalPages ? start + (maxPage - 1) : reservations.totalPages)})">

                        <li class="page-item" th:classappend="${reservations.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/reservations(page=${reservations.number - 1})}" aria-label="Previous">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>

                        <li class="page-item" th:each="page: ${#numbers.sequence(start, end)}"
                            th:classappend="${reservations.number eq page - 1} ? 'active'">
                            <a class="page-link" th:text="${page}" th:href="@{/admin/reservations(page=${page - 1})}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${reservations.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/reservations(page=${reservations.number + 1})}" aria-label="Next">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
</html>
