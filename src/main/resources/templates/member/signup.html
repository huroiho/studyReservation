<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 | StudyRoom</title>
  <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" th:href="@{/}">
      <span class="brand-mark">SR</span>
      <span class="brand-text">StudyRoom</span>
    </a>

    <nav class="nav">
      <a class="nav-link" th:href="@{/}">홈</a>
      <a class="nav-link" th:href="@{/rooms}">룸</a>
      <a class="nav-link" th:href="@{/reservations}">예약</a>
      <a class="nav-link" th:href="@{/login}">로그인</a>
      <a class="nav-link is-active" th:href="@{/signup}">회원가입</a>
    </nav>
  </div>
</header>

<main class="page">
  <div class="container">
    <div class="auth-layout">

      <!-- 왼쪽 소개 영역 -->
      <section class="hero">
        <div class="hero-badge">StudyRoom Reservation</div>
        <h1 class="hero-title">회원가입</h1>
        <p class="hero-desc">
          간단한 정보 입력으로<br/>
          스터디룸 예약 서비스를 시작하세요.
        </p>

        <ul class="hero-points">
          <li>
            <span class="dot"></span>
            <span>운영정책 기반 정확한 예약</span>
          </li>
          <li>
            <span class="dot"></span>
            <span>결제/환불 상태 한눈에 관리</span>
          </li>
          <li>
            <span class="dot"></span>
            <span>마이페이지에서 예약 내역 확인</span>
          </li>
        </ul>
      </section>

      <!-- 오른쪽 회원가입 카드 -->
      <section class="card">
        <div class="card-head">
          <h2 class="card-title">회원가입</h2>
          <p class="card-sub">아래 정보를 입력해주세요.</p>
        </div>

        <form class="form"
              th:action="@{/signup}"
              th:object="${memberSignupRequest}"
              method="post">

          <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}">
            <span th:each="err : ${#fields.globalErrors()}"
                  th:text="${err}"></span>
          </div>

          <!-- CSRF -->
          <input type="hidden"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}" />

          <!-- 이름 -->
          <div class="field">
            <label class="label" for="name">이름</label>
            <div class="input-wrap">
              <input class="input"
                     type="text"
                     id="name"
                     th:field="*{name}"
                     placeholder="이름 입력"
                     required />
            </div>
            <p class="error" th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}"></p>
          </div>

          <!-- 이메일 -->
          <div class="field">
            <label class="label" for="email">이메일</label>
            <div class="input-wrap">
              <span class="icon">@</span>
              <input class="input"
                     type="email"
                     id="email"
                     th:field="*{email}"
                     placeholder="예: user@test.com"
                     required />
            </div>
            <p class="error" th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}"></p>
          </div>

          <!-- 비밀번호 -->
          <div class="field">
            <label class="label" for="password">비밀번호</label>
            <div class="input-wrap">
              <span class="icon">＊</span>
              <input class="input"
                     type="password"
                     id="password"
                     th:field="*{password}"
                     placeholder="비밀번호 입력"
                     required />
            </div>
            <p class="error" th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}"></p>
          </div>

          <!-- 전화번호 -->
          <div class="field">
            <label class="label" for="phoneNumber">전화번호</label>
            <div class="input-wrap">
              <input class="input"
                     type="text"
                     id="phoneNumber"
                     th:field="*{phoneNumber}"
                     placeholder="010-0000-0000"
                     required />
            </div>
            <p class="error" th:if="${#fields.hasErrors('phoneNumber')}"
               th:errors="*{phoneNumber}"></p>
          </div>

          <button class="btn" type="submit">
            회원가입
            <span class="btn-arrow">→</span>
          </button>

          <div class="card-foot">
            <p class="muted">
              이미 계정이 있으신가요?
              <a th:href="@{/login}">로그인</a>
            </p>
          </div>
        </form>
      </section>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <div class="footer-brand">
        <span class="brand-mark small">SR</span>
        <span>StudyRoom</span>
      </div>
      <p class="footer-desc">
        정책 기반 예약 시스템 · 운영시간/룰/환불정책을 일관되게 관리합니다.
      </p>
    </div>

    <div class="footer-right">
      <a class="footer-link" th:href="@{/swagger-ui/index.html}">API Docs</a>
      <a class="footer-link" th:href="@{/}">Home</a>
    </div>
  </div>
</footer>

</body>
</html>
