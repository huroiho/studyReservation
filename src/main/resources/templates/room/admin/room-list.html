<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>스터디룸 관리</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/admin-room-list.css}">
</head>
<body>

<header th:insert="~{fragment/header :: siteHeader(activeLink='rooms')}"></header>
<nav th:insert="~{fragment/admin-nav :: siteNav(activeLink='rooms')}"></nav>

<div class="container">

    <!-- Page Header -->
    <div class="page-header">
        <h2>스터디룸 관리</h2>
        <a th:href="@{/admin/rooms/new}" class="btn btn-primary">
            <span class="material-icons">add</span>
            새 룸 추가
        </a>
    </div>

    <!-- Room List -->
    <div class="form-card">

        <table class="room-table">
            <thead>
            <tr>
                <th>썸네일</th>
                <th>룸 이름</th>
                <th>수용 인원</th>
                <th>가격</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="room : ${rooms}">
                <td class="thumb-cell">
                    <img th:if="${room.thumbnailUrl != null}"
                         th:src="${room.thumbnailUrl}"
                         alt="thumbnail">
                    <div th:if="${room.thumbnailUrl == null}" class="no-image">
                        NO IMAGE
                    </div>
                </td>

                <td th:text="${room.name}">스터디룸 A</td>
                <td th:text="${room.maxCapacity + '명'}">4명</td>
                <td th:text="${#numbers.formatInteger(room.price, 3, 'COMMA') + '원 / 시간'}">
                    10,000원 / 시간
                </td>

                <td>
                    <span th:classappend="${room.status.name() == 'ACTIVE' ? 'status-active' : 'status-inactive'}"
                          th:text="${room.status}">
                        ACTIVE
                    </span>
                </td>

                <td class="action-cell">
                    <a th:href="@{|/admin/rooms/${room.id}/edit|}"
                       class="icon-btn edit">
                        <span class="material-icons">edit</span>
                    </a>
                    <button type="button" class="icon-btn delete">
                        <span class="material-icons">delete</span>
                    </button>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(rooms)}">
                <td colspan="6" class="empty-row">
                    등록된 스터디룸이 없습니다.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
        <a th:if="${page.hasPrevious()}"
           th:href="@{/admin/rooms(page=${page.number - 1})}"
           class="page-btn">
            <span class="material-icons">chevron_left</span>
        </a>

        <span class="page-info">
            <span th:text="${page.number + 1}">1</span>
            /
            <span th:text="${page.totalPages}">1</span>
        </span>

        <a th:if="${page.hasNext()}"
           th:href="@{/admin/rooms(page=${page.number + 1})}"
           class="page-btn">
            <span class="material-icons">chevron_right</span>
        </a>
    </div>

</div>

<footer th:insert="~{fragment/footer :: siteFooter}"></footer>

</body>
</html>
