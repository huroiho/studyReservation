<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>방 예약 규칙 상세</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/room-rule-style.css}">

</head>
<body>

<div class="container">
    <a th:href="@{/admin/roomRules}" class="back-link">
        <span class="material-icons">arrow_back</span> 목록으로
    </a>

    <h2>방 예약 규칙 상세</h2>

    <div class="info-box">
        <span class="material-icons icon">error_outline</span>
        <div>
            <div class="warning-text">이 규칙은 생성 후 내용 수정이 불가능합니다.</div>
            <div class="sub-text">필요 시 새로운 규칙을 등록하거나 상태를 변경하세요.</div>
        </div>
    </div>

    <div class="section-card">
        <span class="section-title">기본 정보</span>
        <div class="info-grid">
            <div class="info-item">
                <label>규칙 ID</label>
                <span th:text="${roomRules.id}">1</span>
            </div>
            <div class="info-item">
                <label>규칙명</label>
                <span th:text="${roomRules.name}">일반 예약 규칙</span>
            </div>
            <div class="info-item">
                <label>상태</label>
                <div class="status-wrapper">
                    <label class="switch">
                        <input type="checkbox" th:checked="${roomRules.isActive}" disabled>
                        <span class="slider"></span>
                    </label>
                    <span th:class="${roomRules.isActive ? 'badge badge-active' : 'badge badge-inactive'}"
                          th:text="${roomRules.isActive ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span>
                </div>
            </div>
            <div class="info-item">
                <label>사용 중인 룸 수</label>
                <span>5개</span> </div>
            <div class="info-item">
                <label>최소 이용 시간</label>
                <span th:text="${roomRules.minDurationMinutes + '분'}">60분</span>
            </div>
            <div class="info-item">
                <label>예약 가능 기간</label>
                <span th:text="${roomRules.bookingOpenDays + '일'}">30일</span>
            </div>
            <div class="info-item">
                <label>생성일</label>
                <span th:text="${#temporals.format(roomRules.createdAt, 'yyyy. MM. dd. a hh:mm')}">2025. 01. 15. 오전 10:30</span>
            </div>
            <div class="info-item">
                <label>활성 변경일</label>
                <span th:text="${#temporals.format(roomRules.activeUpdatedAt, 'yyyy. MM. dd. a hh:mm')}">2025. 01. 15. 오전 10:30</span>
            </div>
        </div>
    </div>

    <div class="section-card">
        <span class="section-title">이 규칙을 사용하는 룸</span>
        <table class="room-table">
            <thead>
            <tr>
                <th>룸 ID</th>
                <th>룸명</th>
                <th>상태</th>
                <th>액션</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>101</td>
                <td>회의실 A</td>
                <td><span class="badge badge-active">ACTIVE</span></td>
                <td><a href="#" class="link-text">룸 상세 이동 <span class="material-icons" style="font-size: 14px;">open_in_new</span></a></td>
            </tr>
            <tr>
                <td>102</td>
                <td>회의실 B</td>
                <td><span class="badge badge-active">ACTIVE</span></td>
                <td><a href="#" class="link-text">룸 상세 이동 <span class="material-icons" style="font-size: 14px;">open_in_new</span></a></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="footer-actions">
        <a th:href="@{/admin/roomRules}" class="btn-outline">목록으로</a>
        <button class="btn-delete" disabled>
            <span class="material-icons" style="font-size: 18px;">delete</span> 삭제
        </button>
    </div>
</div>

</body>
</html>
