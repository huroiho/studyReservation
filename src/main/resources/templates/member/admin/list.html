<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원목록 | StudyRoom</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/fragment-style.css}">
    <link rel="stylesheet" th:href="@{/css/member-list.css}">
</head>
<body>
<header th:insert="~{fragment/header :: siteHeader(activeLink='')}"></header>
<nav th:insert="~{fragment/admin-nav :: siteNav(activeLink='member')}"></nav>
<div class="admin-container container">
    <h2>회원 관리</h2>
    <div class="search-card">
        <form method="get" class="search-form">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="이름 또는 이메일 검색">
            <button type="submit">검색</button>
        </form>
    </div>

    <div class="table-container">
        <table class="member-table">
            <thead>
            <tr>
                <th></th>
                <th>이름</th>
                <th>전화번호</th>
                <th>이메일</th>
                <th>관리</th>
                <th>가입일</th>
                <th>탈퇴일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="member : ${members}">
                <td></td>
                <td th:text="${member.name}">홍길동</td>
                <td th:text="${member.phoneNumber()}">010-0000-0000</td>
                <td th:text="${member.email}">test@test.com</td>
                <td th:text="${member.role()}">권한</td>
                <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd')}">2026-01-01</td>
                <td th:text="${#temporals.format(member.deletedAt, 'yyyy-MM-dd')}">2026-01-01</td>
    <!--            <td><a th:href="@{/admin/members/{id}(id=${member.id})}" class="btn-small">상세</a></td>-->
            </tr>
            </tbody>
        </table>

        </div>
    <div th:replace="~{fragment/pagination :: sitePagination(${page}, 'admin/members')}"></div>
</div>
<Footer th:insert="~{fragment/footer :: siteFooter}"></Footer>
</body>
</html>
