<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>비밀번호 변경</title></head>
<body>

<h1>비밀번호 변경</h1>

<form th:action="@{/my/password}"
      th:object="${memberPasswordChangeRequest}"
      method="post">

    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />

    <div>
        <input type="password" placeholder="현재 비밀번호"
               th:field="*{currentPassword}">
        <div th:errors="*{currentPassword}"></div>
    </div>

    <div>
        <input type="password" placeholder="새 비밀번호"
               th:field="*{newPassword}">
        <div th:errors="*{newPassword}"></div>
    </div>

    <div>
        <input type="password" placeholder="새 비밀번호 확인"
               th:field="*{newPasswordConfirm}">
        <div th:errors="*{newPasswordConfirm}"></div>
    </div>

    <button type="submit">변경</button>
</form>

<a th:href="@{/my}">취소</a>

</body>
</html>
